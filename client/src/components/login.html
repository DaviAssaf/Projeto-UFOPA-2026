<form id="login-form">
	<h1>Login</h1>
	<button type="button" id="btn-close">X</button>

	<label for="email">Email:</label>
	<input type="email" id="email" name="email" required />

	<label for="password">Senha:</label>
	<div class="password-wrapper">
		<input type="password" id="password" name="password" required />
		<button type="button" class="toggle-password no-style" data-target="password">
			<i class="fa fa-eye" aria-hidden="true"></i>
		</button>
	</div>

	<p>Não tem uma conta? <a id="register-opener">Crie aqui</a></p>

	<button type="submit">Entrar</button>

	<div id="login-loading" class="hidden absolute inset-0 bg-black/50 flex items-center justify-center z-50">
		<div class="bg-white p-6 rounded-xl shadow-lg text-center">
			<div class="w-10 h-10 border-4 border-gray-200 border-t-gray-600 rounded-full animate-spin mx-auto mb-3"></div>
			<p>Conectando...</p>
		</div>
	</div>
</form>
