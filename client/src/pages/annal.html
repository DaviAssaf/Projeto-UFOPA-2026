<!doctype html>
<html lang="pt-br">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<title>Anexo</title>
		<script type="module" src="../assets/js/main.js"></script>
		<style>
			/* 1. Garante que o layout ocupe a altura toda sem scroll infinito */
			html,
			body {
				height: 100%;
				margin: 0;
				display: flex;
				flex-direction: column;
			}

			/* 2. Container principal flexível */
			.content-wrapper {
				flex: 1; /* Ocupa todo o espaço disponível entre header e footer */
				display: flex;
				flex-direction: column;
				padding: 20px;
				box-sizing: border-box;
			}

			/* 3. A div do PDF se ajusta ao espaço que sobra */
			.pdf-container {
				flex: 1;
				width: 100%;
				min-height: 0; /* Importante para o Firefox não bugar no flex */
				border: 1px solid #ccc;
				border-radius: 8px;
				overflow: hidden;
			}

			/* 4. O embed preenche a div pai completamente */
			.pdf-container embed {
				display: block;
				width: 100%;
				height: 100%;
			}
		</style>
	</head>
	<body>
		<header id="header"></header>

		<main class="content-wrapper">
			<h1>Titulo do Anexo</h1>
			<p>Descrição do anexo</p>

			<div class="pdf-container">
				<embed src="../../../server/public/uploads/Aether - Sistema de Poder.pdf" type="application/pdf" />
			</div>
		</main>

		<footer id="footer"></footer>
	</body>
</html>
